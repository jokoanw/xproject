<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPO BEM - Portal Eksklusif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .serif { font-family: 'Playfair Display', serif; }
        .input-field { 
            background: #f9f9f9; 
            border: 1px solid #eeeeee; 
            transition: all 0.3s ease;
        }
        .input-field:focus { 
            background: #ffffff; 
            border-color: #000000; 
            outline: none; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .tab-active { background: #000000; color: #ffffff; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <header class="text-center mb-12">
            <div class="flex justify-center gap-4 mb-6 opacity-20">
                <div class="w-10 h-10 bg-black rounded-full"></div>
                <div class="w-10 h-10 bg-black rounded-full"></div>
            </div>
            <h1 class="serif text-4xl mb-3 tracking-tight">SIPO Portal</h1>
            <p class="text-[10px] tracking-[0.4em] uppercase text-gray-400">Universitas Jenderal Soedirman</p>
        </header>

        <div class="flex mb-10 border-b border-gray-100">
            <button onclick="switchTab('mhs')" id="tab-mhs" class="flex-1 pb-4 text-xs font-bold uppercase tracking-widest border-b-2 border-black transition-all">Mahasiswa</button>
            <button onclick="switchTab('adm')" id="tab-adm" class="flex-1 pb-4 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-gray-300 transition-all">Pengurus</button>
        </div>

        <div id="section-mhs" class="space-y-8">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-1">Identitas Akademik</label>
                    <input type="text" placeholder="Masukkan NIM (Contoh: K1C0...)" class="input-field w-full mt-2 px-6 py-4 rounded-xl text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-1">Token Akses (1 Menit)</label>
                    <input type="password" maxlength="6" placeholder="••••••" class="input-field w-full mt-2 px-6 py-4 rounded-xl text-center text-2xl tracking-[0.8em]">
                </div>
            </div>
            <button class="w-full bg-black text-white py-5 rounded-xl text-sm font-bold uppercase tracking-widest hover:opacity-90 transition-all shadow-2xl shadow-black/10">Verifikasi & Masuk</button>
            <p class="text-[10px] text-center text-gray-400 leading-relaxed italic">"Token diperbarui secara berkala oleh PSDM BEM untuk keamanan data yudisium."</p>
        </div>

        <div id="section-adm" class="hidden space-y-8">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-1">ID Pengurus</label>
                    <input type="text" id="admin-user" placeholder="Username" class="input-field w-full mt-2 px-6 py-4 rounded-xl text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-1">Kata Sandi</label>
                    <input type="password" id="admin-pass" placeholder="••••••••" class="input-field w-full mt-2 px-6 py-4 rounded-xl text-sm">
                </div>
            </div>
            <button onclick="loginAdmin()" class="w-full bg-black text-white py-5 rounded-xl text-sm font-bold uppercase tracking-widest hover:opacity-90 transition-all shadow-2xl shadow-black/10">Otorisasi Admin</button>
            
            <div class="p-4 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                <p class="text-[9px] text-gray-400 uppercase tracking-wider mb-1">Catatan Developer:</p>
                <p class="text-[10px] text-gray-500">User: <strong>admin_bem</strong><br>Pass: <strong>unsoed2026</strong></p>
            </div>
        </div>

    </div>

    <script>
        function switchTab(type) {
            const secMhs = document.getElementById('section-mhs');
            const secAdm = document.getElementById('section-adm');
            const tabMhs = document.getElementById('tab-mhs');
            const tabAdm = document.getElementById('tab-adm');

            if(type === 'mhs') {
                secMhs.classList.remove('hidden');
                secAdm.classList.add('hidden');
                tabMhs.className = "flex-1 pb-4 text-xs font-bold uppercase tracking-widest border-b-2 border-black transition-all";
                tabAdm.className = "flex-1 pb-4 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-gray-300 transition-all";
            } else {
                secAdm.classList.remove('hidden');
                secMhs.classList.add('hidden');
                tabAdm.className = "flex-1 pb-4 text-xs font-bold uppercase tracking-widest border-b-2 border-black transition-all";
                tabMhs.className = "flex-1 pb-4 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-gray-300 transition-all";
            }
        }

        function loginAdmin() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;

            // Kredensial untuk kamu coba
            if(user === "admin_bem" && pass === "unsoed2026") {
                alert("Otorisasi Berhasil. Mengalihkan ke Dashboard PSDM...");
            } else {
                alert("Akses Ditolak. Username atau Password salah.");
            }
        }
    </script>
</body>
</html>
