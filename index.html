<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal - happy_birthday_teteh.py</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #d4d4d4; /* Warna teks abu-abu terang khas Mac Terminal/VS Code */
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            margin: 0;
            padding: 30px;
            font-size: 15px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #console {
            max-width: 800px;
            margin: 0 auto;
        }

        .line {
            margin-bottom: 8px;
            min-height: 24px;
        }

        .system-text {
            color: #569cd6; /* Biru khas keyword coding */
        }

        .success-text {
            color: #4CAF50; /* Hijau untuk status success */
        }

        .string-text {
            color: #ce9178; /* Orange/merah bata khas string Python */
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #d4d4d4;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Tampilan Music Box yang muncul di akhir */
        #media-container {
            display: none;
            max-width: 800px;
            margin: 40px auto 0;
            padding-top: 20px;
            border-top: 1px dashed #555;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        .music-title {
            color: #569cd6;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="console"></div>
    
    <div id="media-container">
        <div class="music-title">> Executing audio_nostalgia.sh ...</div>
        <iframe style="border-radius:12px; margin-bottom: 15px;" src="https://open.spotify.com/embed/track/123456789" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/987654321" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <script>
        // Skenario teks yang akan diketik
        const scriptLines = [
            { text: "login: afdhi_abdilah", type: "system", delay: 800 },
            { text: "Establishing secure connection...", type: "system", delay: 1200 },
            { text: "Origin: Purwokerto, Central Java", type: "system", delay: 800 },
            { text: "Target Location: Okayama, Japan", type: "system", delay: 1000 },
            { text: "Calculating distance... [ 5,300 km ]", type: "system", delay: 1500 },
            { text: "Bypassing physical distance... [ SUCCESS ]", type: "success", delay: 1000 },
            { text: "Compiling memories...", type: "system", delay: 2000 },
            { text: "> python3 happy_birthday_teteh.py", type: "system", delay: 1000 },
            { text: "--------------------------------------------------", type: "normal", delay: 500 },
            { text: "Halo Teteh,", type: "normal", delay: 1000 },
            { text: "Mungkin aneh ya dapet ucapan ulang tahun bentuknya layar terminal gini.", type: "normal", delay: 1500 },
            { text: "Tapi ini caraku, buat ngirim doa dan rindu paling cepat melintasi ribuan kilometer ke Okayama.", type: "normal", delay: 2000 },
            { text: "Selamat ulang tahun! Terima kasih udah jadi kakak yang hebat dan berani berjuang jauh dari rumah.", type: "normal", delay: 2500 },
            { text: "Mungkin di sana udaranya lagi dingin, atau kerjaan lagi numpuk. Tapi luangkan waktu sebentar hari ini buat apresiasi diri sendiri ya.", type: "normal", delay: 2500 },
            { text: "Ingat selalu kalau di sini ada aku dan keluarga yang selalu mendoakan kelancaran Teteh.", type: "normal", delay: 2000 },
            { text: "Jangan lupa istirahat. Makan yang enak.", type: "normal", delay: 1500 },
            { text: "Kalau kangen rumah, play lagu di bawah ini ya.", type: "normal", delay: 1500 },
            { text: "Cepat pulang.", type: "normal", delay: 1500 },
            { text: "--------------------------------------------------", type: "normal", delay: 1000 },
            { text: "Process finished with exit code 0.", type: "system", delay: 1000 },
            { text: "[SYSTEM]: Love successfully delivered.", type: "success", delay: 500 }
        ];

        const consoleDiv = document.getElementById('console');
        let currentLineIndex = 0;

        // Bikin elemen kursor
        const cursor = document.createElement('span');
        cursor.className = 'cursor';

        function typeWriter(text, element, speed, callback) {
            let i = 0;
            element.innerHTML = '';
            element.appendChild(cursor);
            
            function type() {
                if (i < text.length) {
                    // Masukin karakter sebelum kursor
                    const char = document.createTextNode(text.charAt(i));
                    element.insertBefore(char, cursor);
                    i++;
                    setTimeout(type, speed);
                } else {
                    if (callback) callback();
                }
            }
            type();
        }

        function processNextLine() {
            if (currentLineIndex < scriptLines.length) {
                const lineData = scriptLines[currentLineIndex];
                
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';
                
                // Tambahkan warna sesuai tipe
                if (lineData.type === 'system') lineDiv.classList.add('system-text');
                if (lineData.type === 'success') lineDiv.classList.add('success-text');
                
                consoleDiv.appendChild(lineDiv);

                // Kecepatan ngetik (system lebih cepat dari normal)
                const typeSpeed = lineData.type === 'normal' ? 40 : 15;

                typeWriter(lineData.text, lineDiv, typeSpeed, () => {
                    currentLineIndex++;
                    // Scroll otomatis ke bawah
                    window.scrollTo(0, document.body.scrollHeight);
                    setTimeout(processNextLine, lineData.delay);
                });
            } else {
                // Semua teks selesai diketik, munculin music player
                cursor.style.display = 'none';
                const mediaContainer = document.getElementById('media-container');
                mediaContainer.style.display = 'block';
                setTimeout(() => {
                    mediaContainer.style.opacity = '1';
                }, 100);
            }
        }

        // Mulai animasi 1 detik setelah web dibuka
        setTimeout(processNextLine, 1000);

    </script>
</body>
</html>
